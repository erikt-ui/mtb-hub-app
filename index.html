<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MTB Instructor Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white antialiased selection:bg-orange-500/30">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const { useState, useEffect } = React;

    // ==============================================================
    // ZONA DE CONFIGURARE: DATELE TALE SUNT DEJA AICI
    // ==============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCK6CUymJrO7et9T5-z4_u0XRKVKmB7FVw",
      authDomain: "mtb-hub-723e5.firebaseapp.com",
      projectId: "mtb-hub-723e5",
      storageBucket: "mtb-hub-723e5.firebasestorage.app",
      messagingSenderId: "378751049137",
      appId: "1:378751049137:web:7a352b4e4c4d5a590db190"
    };

    // Cheia ta AI Gemini
    const GEMINI_API_KEY = "AIzaSyCjf6pr3vdDoM0Hfp_QbD5Uf4XUtYXkv3M"; 
    // ==============================================================

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Icoane SVG ---
    const TargetIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const ChevronIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
    const CheckIcon = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

    const App = () => {
      const [user, setUser] = useState(null);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      
      const [view, setView] = useState('students'); 
      const [students, setStudents] = useState([]);
      const [activeStudentId, setActiveStudentId] = useState(null);
      const [newStudentName, setNewStudentName] = useState("");
      const [aiContent, setAiContent] = useState(null);
      const [isAiLoading, setIsAiLoading] = useState(false);

      const courseData = [
        {
          level: "Nivel 1: Începător",
          color: "bg-green-600",
          subcategories: [
            { name: "Mecanica", tasks: ["Cască", "Aer roți", "Curățare", "Frâne", "Piese"] },
            { name: "Handling", tasks: ["Atac", "Frânare", "O mână", "Slalom", "Cerc"] },
            { name: "Pumptrack", tasks: ["Picioare", "Rollers", "No Frâne", "Privire", "2 Ture"] },
            { name: "Jumpuri", tasks: ["Față", "Spate", "Level Hop", "Kicker", "Aterizare"] },
            { name: "Trailuri", tasks: ["Verde", "Bordură", "Berm", "Viteze", "1 Deget"] }
          ]
        },
        {
          level: "Nivel 2: Intermediar",
          color: "bg-blue-600",
          subcategories: [
            { name: "Mecanica", tasks: ["Lanț", "Ungere", "Imbus", "Pompă", "Șa"] },
            { name: "Handling", tasks: ["TrackStand", "WheelLift", "B-Hop", "Urgență", "Bidon"] },
            { name: "Pumptrack", tasks: ["No Pedale", "Timp", "Manual R", "Transfer", "Consist."] },
            { name: "Jumpuri", tasks: ["Tabletop", "Clear", "Drop 40cm", "Relax", "Rhythm"] },
            { name: "Trailuri", tasks: ["Albastru", "Rădăcini", "Cornering", "Urcare", "Rezist."] }
          ]
        },
        {
          level: "Nivel 3: Avansat",
          color: "bg-red-600",
          subcategories: [
            { name: "Mecanica", tasks: ["Cameră", "Discuri", "Rebound", "Dinamom.", "Service"] },
            { name: "Handling", tasks: ["Manual 5m", "Endo", "B-Hop 30", "TrackS+", "Fakir"] },
            { name: "Pumptrack", tasks: ["Dbl Manu", "Time Trial", "Triple", "Fakie", "Endur."] },
            { name: "Jumpuri", tasks: ["Gap 2m", "Style", "Drop 1m+", "Step-up", "Dirt"] },
            { name: "Trailuri", tasks: ["Negru", "RockG", "Wallride", "S-Back", "Race"] }
          ]
        }
      ];

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const q = query(collection(db, 'students'));
        const unsubscribe = onSnapshot(q, (snapshot) => {
          setStudents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, (err) => console.error("Firebase sync error:", err));
        return () => unsubscribe();
      }, [user]);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoginError('');
        try {
          await signInWithEmailAndPassword(auth, email, password);
        } catch (err) {
          setLoginError('Email sau parolă incorectă.');
        }
      };

      const addStudent = async () => {
        if (!newStudentName || !user) return;
        const id = Date.now().toString();
        const studentRef = doc(db, 'students', id);
        await setDoc(studentRef, {
          name: newStudentName,
          progress: {},
          instructorId: user.uid,
          createdAt: new Date().toISOString()
        });
        setNewStudentName("");
      };

      const toggleTask = async (studentId, lIdx, sIdx, tIdx) => {
        if (!user) return;
        const student = students.find(s => s.id === studentId);
        if (!student) return;

        const key = `${lIdx}-${sIdx}-${tIdx}`;
        const newProgress = { ...student.progress, [key]: !student.progress[key] };
        
        const studentRef = doc(db, 'students', studentId);
        await setDoc(studentRef, { progress: newProgress }, { merge: true });
      };

      const getInstructorAdvice = async (lvl, subName, tasks) => {
        if (!user || !GEMINI_API_KEY) {
            setAiContent({ title: "Atenție", text: "Lipsește cheia API Gemini."});
            return;
        }
        setIsAiLoading(true);
        
        const fullPrompt = `Ești un Master Instructor MTB. Oferă 3 sfaturi metodice scurte pentru instructori în limba română (max 80 cuvinte). Concentrează-te pe corecții tehnice.\n\nDate: Nivel: ${lvl}. Subcategorie: ${subName}. Task-uri: ${tasks.join(", ")}.`;

        try {
          // Folosim modelul corect suportat
          const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: fullPrompt }] }]
            })
          });
          
          const data = await resp.json();
          
          if (!resp.ok) {
            throw new Error(data.error?.message || `Eroare HTTP: ${resp.status}`);
          }
          
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          setAiContent({ title: String(subName), text: text || "Răspuns gol." });
        } catch (e) { 
          setAiContent({ title: "Eroare AI", text: e.message });
        } finally { 
          setIsAiLoading(false); 
        }
      };

      // --- ECRAN LOGIN ---
      if (!user) {
        return (
          <div className="min-h-screen bg-neutral-950 flex flex-col items-center justify-center p-4">
            <div className="bg-neutral-900 border border-neutral-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
              <div className="flex justify-center mb-6 text-orange-500">
                <TargetIcon />
              </div>
              <h1 className="text-2xl font-black text-white text-center mb-8 italic uppercase tracking-tighter">MTB Hub</h1>
              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="text-[10px] uppercase font-bold text-neutral-500 ml-1">Email Instructor</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-white outline-none focus:border-orange-500 mt-1" required />
                </div>
                <div>
                  <label className="text-[10px] uppercase font-bold text-neutral-500 ml-1">Parolă</label>
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-white outline-none focus:border-orange-500 mt-1" required />
                </div>
                {loginError && <p className="text-red-500 text-xs text-center font-bold">{loginError}</p>}
                <button type="submit" className="w-full bg-orange-600 hover:bg-orange-500 text-white font-black p-3 rounded-xl uppercase tracking-widest mt-4 transition-colors">
                  Intră
                </button>
              </form>
            </div>
          </div>
        );
      }

      // --- ECRAN APLICATIE ---
      return (
        <div className="min-h-screen bg-neutral-950 text-white max-w-2xl mx-auto border-x border-neutral-800 font-sans pb-24">
          <header className="p-4 border-b border-neutral-800 flex justify-between items-center bg-neutral-900/95 sticky top-0 z-50">
            <div className="flex items-center gap-2 text-orange-500">
              <TargetIcon />
              <h1 className="font-black italic tracking-tighter uppercase text-lg text-white">MTB HUB</h1>
            </div>
            <div className="flex bg-neutral-800 p-1 rounded-xl border border-neutral-700">
              <button onClick={() => setView('students')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${view === 'students' ? 'bg-orange-600 text-white' : 'text-neutral-400'}`}>Elevi</button>
              <button onClick={() => { setView('curriculum'); setActiveStudentId(null); }} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${view === 'curriculum' ? 'bg-orange-600 text-white' : 'text-neutral-400'}`}>Ghid</button>
              <button onClick={() => signOut(auth)} className="px-3 py-1.5 text-neutral-500 hover:text-red-500 border-l border-neutral-700 ml-1">Ieșire</button>
            </div>
          </header>

          <main className="p-4">
            {view === 'students' && !activeStudentId && (
              <div className="space-y-4">
                <div className="flex gap-2">
                  <input className="bg-neutral-900 border border-neutral-800 p-4 rounded-2xl flex-1 outline-none focus:border-orange-500" placeholder="Nume elev nou..." value={newStudentName} onChange={e => setNewStudentName(e.target.value)} onKeyDown={e => e.key === 'Enter' && addStudent()} />
                  <button onClick={addStudent} className="bg-orange-600 px-6 rounded-2xl font-black text-xl hover:bg-orange-500 active:scale-95 transition-all">+</button>
                </div>
                
                <div className="grid gap-3">
                  {students.length === 0 && <p className="text-center text-neutral-600 text-sm mt-10">Niciun elev înregistrat.</p>}
                  {students.map(s => (
                    <div key={s.id} onClick={() => setActiveStudentId(s.id)} className="bg-neutral-900 p-5 rounded-2xl flex justify-between items-center cursor-pointer border border-neutral-800 hover:border-orange-600 transition-colors">
                      <div className="flex items-center gap-4">
                        <div className="w-10 h-10 bg-neutral-800 rounded-full flex items-center justify-center text-orange-500 font-black border border-neutral-700">
                          {String(s.name).charAt(0).toUpperCase()}
                        </div>
                        <div>
                          <span className="font-bold text-lg block">{String(s.name)}</span>
                          <span className="text-[10px] text-neutral-500 font-black uppercase tracking-widest">{Object.keys(s.progress || {}).filter(k => s.progress[k]).length} bife</span>
                        </div>
                      </div>
                      <div className="text-neutral-600"><ChevronIcon /></div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeStudentId && students.find(s => s.id === activeStudentId) && (
              <div>
                <button onClick={() => setActiveStudentId(null)} className="mb-6 text-orange-500 text-xs font-black uppercase tracking-widest flex items-center gap-1">Înapoi</button>
                <h2 className="text-3xl font-black mb-8 border-l-4 border-orange-600 pl-4 uppercase italic tracking-tighter">{String(students.find(s => s.id === activeStudentId).name)}</h2>
                
                {courseData.map((lvl, lIdx) => (
                  <div key={lIdx} className="mb-10 rounded-[2rem] overflow-hidden border border-neutral-800 bg-neutral-900/40 shadow-xl">
                    <div className={`${lvl.color} p-2 text-center text-[10px] font-black uppercase tracking-widest text-white`}>{lvl.level}</div>
                    <div className="p-5 space-y-8">
                      {lvl.subcategories.map((sub, sIdx) => (
                        <div key={sIdx}>
                          <div className="flex justify-between items-center mb-4">
                            <span className="text-[10px] font-black text-neutral-400 uppercase tracking-widest italic">{sub.name}</span>
                            <button onClick={() => getInstructorAdvice(lvl.level, sub.name, sub.tasks)} className="text-[9px] text-orange-400 font-black uppercase border border-orange-900 px-3 py-1 rounded-full bg-orange-900/10">Metodă AI</button>
                          </div>
                          <div className="grid grid-cols-5 gap-2">
                            {sub.tasks.map((task, tIdx) => {
                              const done = students.find(s => s.id === activeStudentId).progress?.[`${lIdx}-${sIdx}-${tIdx}`];
                              return (
                                <button key={tIdx} onClick={() => toggleTask(activeStudentId, lIdx, sIdx, tIdx)} className={`p-1.5 aspect-square rounded-xl border flex flex-col items-center justify-center transition-all active:scale-95 ${done ? 'bg-orange-600 border-orange-400 text-white shadow-lg shadow-orange-900/30' : 'bg-neutral-800 border-neutral-700 text-neutral-500'}`}>
                                  <span className="text-[9px] font-black text-center leading-[11px]">{String(task)}</span>
                                  {done && <div className="mt-1 text-white"><CheckIcon /></div>}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {view === 'curriculum' && (
              <div className="space-y-6">
                <h2 className="text-2xl font-black uppercase italic border-l-4 border-orange-600 pl-4 mb-8">Ghid Metodologic</h2>
                {courseData.map((lvl, lIdx) => (
                  <div key={lIdx} className="space-y-4">
                    <div className={`${lvl.color} px-4 py-1.5 rounded-full text-[10px] font-black uppercase inline-block`}>{lvl.level}</div>
                    <div className="grid gap-3">
                      {lvl.subcategories.map((sub, sIdx) => (
                        <div key={sIdx} className="bg-neutral-900 p-5 rounded-2xl border border-neutral-800 flex justify-between items-center">
                          <div className="flex flex-col">
                            <span className="font-black text-xs uppercase text-neutral-500 tracking-widest mb-2">{sub.name}</span>
                            <div className="flex gap-1.5 flex-wrap">
                              {sub.tasks.map((t, i) => (
                                <span key={i} className="text-[10px] bg-neutral-800 px-2 py-0.5 rounded border border-neutral-700 text-neutral-400 font-bold">{String(t)}</span>
                              ))}
                            </div>
                          </div>
                          <button onClick={() => getInstructorAdvice(lvl.level, sub.name, sub.tasks)} className="text-orange-500 p-2 bg-neutral-800 rounded-full">✨</button>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </main>

          {aiContent && (
            <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-[100]">
              <div className="bg-neutral-900 border border-neutral-800 p-6 rounded-[2rem] w-full max-w-sm">
                <div className="flex items-center gap-2 mb-4 text-orange-500">
                  <h3 className="font-black uppercase text-[10px] tracking-widest">Instructor: {String(aiContent.title)}</h3>
                </div>
                <div className="p-4 bg-neutral-800/50 rounded-2xl">
                  <p className="text-sm leading-relaxed text-neutral-300 italic whitespace-pre-line">{String(aiContent.text)}</p>
                </div>
                <button onClick={() => setAiContent(null)} className="w-full mt-6 bg-orange-600 py-3 rounded-xl font-black uppercase text-xs tracking-widest">Am înțeles</button>
              </div>
            </div>
          )}

          {isAiLoading && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[110]">
              <div className="text-orange-500 font-black uppercase tracking-widest text-xs animate-pulse">Se generează...</div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
